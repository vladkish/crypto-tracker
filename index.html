<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- script -->
    <script defer src="script.js"></script>

    <!-- link for style -->
    <link rel="stylesheet" href="style.css">

    <title>crypto-tracker</title>
</head>
<body>
    <!-- header -->
    <header class="header">
        <img src="" alt="" class="logo">

        <div class="textCompany">Web.Alp</div>
    </header>

    <!-- section form -->
    <section class="form-section">

        <h1 class="main-text">Become more than you are </h1>

        <form action="" id="form">

            <div class="block-frist-form">
                <div>
                    <label for="" date-label="1">Name coin</label>
                    <input type="text" date-input="1">
                </div>

                <div>
                    <label for="" date-label="2">Count coin</label>
                    <input type="text" date-input="2">
                </div>
            </div>

            <div class="block-second-form">
                <div>
                    <label for="" date-label="3">Price now</label>
                    <input type="text" date-input="3">
                </div>

                <div>
                    <label for="" date-label="4">What do you want at price</label>
                    <input type="text" date-input="4">
                </div>
            </div>

        </form>

    </section>

    <!-- all coin -->
    <section class="coin-section">
        <div class="card-coin">
            <img src="" alt="" class="img-coin">
            <h1 class="name-coin">BITCOIN</h1>
            <p class="price">31.000$</p>
            <p class="plus">----</p>
            <p class="minus">----</p>

            <button class="button-delete">DELETE</button>
        </div>
    </section>

    <!-- block position -->

    <div class="theme-block">
        🌓
    </div>
</body> 
</html>
