<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- link for style -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="theme.css">

    <title>crypto-tracker</title>
</head>
<body>
    <!-- header -->
    <header class="header">
        
        <a href="https://github.com/vladkish" class="logo-image">
            <img src="/img/logo.jpg" alt="logo" class="logo">
        </a>

        <div class="textCompany">Web.Alp</div>
    </header>

    <!-- section form -->
    <section class="form-section">

        <h1 class="main-text">Become more than you are </h1>

        <form action="" id="form" class="form">

            <div class="block-frist-form">
                <div>
                    <label for="" date-label="1">Name coin</label>
                    <input type="text" date-input="1">
                </div>

                <div>
                    <label for="" date-label="2">Count coin</label>
                    <input type="text" date-input="2">
                </div>
            </div>

            <div class="block-second-form">
                <div>
                    <label for="" date-label="3">Price now</label>
                    <input type="text" date-input="3">
                </div>

                <div>
                    <label for="" date-label="4">What do you expect from the price?</label>
                    <input type="text" date-input="4">
                </div>
            </div>

            <button class="add-button">CREATE COIN</button>
        </form>


    </section>

    <!-- all coin -->
    <section class="coin-section"></section>

    <!-- block position -->

    <div class="theme-block">
        🌓
    </div>

    <!-- script -->
    <script defer src="script.js"></script>
    <script defer src="theme.js"></script>
</body> 
</html>
